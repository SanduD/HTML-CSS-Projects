<!DOCTYPE html>

<html>
  <head>
    <title>Survey Form</title>
    <link rel="stylesheet" type="text/css" href="styles.css" />
  </head>
  <body>
    <h1 id="title">freeCodeCamp Survey Form</h1>
    <p id="description">Thank you for taking the time to help us improve the platform.</p>
    <form id="survey-form">
      <fieldset>
        <label id="name-label">Name<input type="text" id="name" required placeholder="Name"></label>
        <label id="email-label">Email<input type="email" id="email" required placeholder="Email"></label>
        <label id="number-label">Age<input type="number" id="number" min="12" max="80" placeholder="Age"</label>
      </fieldset>
      
      <fieldset>Which option best describes your current role?
        <select id="dropdown">
          <option value="">Select current role</option>
          <option value="1">Student</option>
          <option value="2">Full time job</option>
          <option value="3">Full time learner</option>
          <option value="4">Prefer not to say</option>
          <option value="5">Other</option>
        </select>
     
        <p>Would you recommend freeCodeCamp to a friend?</p>
        <label><input type="radio" name="recommend" value="1">Definitely</label>
         <label><input type="radio" name="recommend" value="2">Maybe</label>
          <label><input type="radio" name="recommend" value="3">Not sure</label>

          <p>What would you like to see improved? (Check all that apply)</p>
        <label><input type="checkbox"  value="0"> Front-end Projects</label>
        <label ><input type="checkbox"  value="1">Back-end Projects</label>
        <label ><input type="checkbox"  value="2">Data Visualization</label>
        <label ><input type="checkbox"  value="3">Challenges</label>
         <label ><input type="checkbox"  value="4">Open Source Community</label>

        <label>Any comments or suggestions?<textarea name="review" rows="2" cols="30" placeholder="Enter your comment here..."></textarea>
      </fieldset>
    
    <label><input type="submit" id="submit"></label>
    </form>

  </body>

</html>
